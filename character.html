<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters</title>
    <style>
        /* ---- 全体 ---- */
body {
    margin: 0;
    font-family: "Noto Sans JP", sans-serif;
    background: #0d0b12;
    color: #e8d6ff;
}

/* ---- ヒーローセクション ---- */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: linear-gradient(180deg, #1a1523, #0d0b12);
    border-bottom: 1px solid #3a2d4a;
}

.hero h1 {
    font-family: "Cinzel", serif;
    font-size: 3rem;
    margin: 0;
    letter-spacing: 2px;
}

.hero p {
    margin-top: 10px;
    font-size: 1.1rem;
    opacity: 0.8;
}

/* ---- キャラ一覧 ---- */
.character-list {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 60px 20px;
    flex-wrap: wrap;
}

.char-card {
    width: 260px;
    text-align: center;
    background: #1a1523;
    padding: 20px;
    border: 1px solid #3a2d4a;
    border-radius: 8px;
    transition: 0.3s ease;
}

.char-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 20px rgba(232, 214, 255, 0.2);
}

.char-card img {
    width: 100%;
    height: auto;
    border-bottom: 1px solid #3a2d4a;
    margin-bottom: 15px;
}

.char-card h2 {
    font-family: "Cinzel", serif;
    margin: 10px 0 5px;
}

.subtitle {
    font-size: 0.9rem;
    opacity: 0.7;
}

/* ---- フッター ---- */
footer {
    text-align: center;
    padding: 20px;
    font-size: 0.8rem;
    opacity: 0.6;
    border-top: 1px solid #3a2d4a;
}


 .brandLogo { width: min(210px, 70vw); }

  
      .brand {
        position: absolute;
        top: -10px;
        left: 15px;
        pointer-events: auto;
        display: flex;
        align-items: center;
      }

      .brandLogo {
  width: min(270px, 48vw);
        height: auto;
        display: block;
        opacity: 0.96;
        image-rendering: -webkit-optimize-contrast;
        filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.42));
        user-select: none;
        -webkit-user-drag: none;
      }

    </style>
</head>
<body>

<header class="hero">
    <h1>桔梗家</h1>
    <div class="brand parallax layer-logo" onclick="location.href='index.html'">
      <img class="brandLogo" src="./logo.png" alt="KOTO" decoding="async" />
    </div>

</header>

<section class="character-list">
    <div class="char-card" onclick="location.href='meu.html'" >
        <img src="meu.jpeg" alt="Character 1">
        <h2>愛生</h2>
        <span class="subtitle">Meu</span>
    </div>

    <div class="char-card" onclick="location.href='suzune.html'">
        <img src="suzune.jpeg"  alt="Character 2">
        <h2>鈴音</h2>
        <span class="subtitle">Suzune</span>
    </div>

    <div class="char-card" onclick="location.href='sakamaki.html'">
        <img src="sakamaki.jpeg"  alt="Character 3">
        <h2>逆巻</h2>
        <span class="subtitle">Sakamaki</span>
    </div>
</section>

<footer>
    <p>Kikyo</p>
</footer>

</body>
</html>
