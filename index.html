<html>
  <head>
  <meta charset="UTF-8" />
  <title>Kikyo-KotO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">

    <!-- ➊ 外部スクリプト読み込み (three.js 本体) -->
    <script type="importmap">
      {
        "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>

  


    <!-- three.jsのサンプルプログラム -->
    <script type="module">
      // canvasを取得
      const myCanvas = document.querySelector('#myCanvas');

      //
      // ➋ three.jsセットアップ
      //

      // ライブラリの読み込み
      import * as THREE from 'three';
  import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
  import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

      // 座表軸
  const axes = new THREE.AxesHelper(0.5);

      // シーンを初期化
      const scene = new THREE.Scene();
  // 背景画像はthree.js側（scene.background）に設定
  // ※ CSS の body 背景ではなく、キャンバス内に描画される
  const bgTexture = new THREE.TextureLoader().load('./back.png');
  bgTexture.colorSpace = THREE.SRGBColorSpace;
  bgTexture.wrapS = THREE.ClampToEdgeWrapping;
  bgTexture.wrapT = THREE.ClampToEdgeWrapping;
  scene.background = bgTexture;
  // デバッグが不要なら次の行をコメントアウトすると見た目が可愛くなります
  // scene.add(axes);

  // ライト（GLBの材質表示に必須）
  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
  hemiLight.position.set(0, 2, 0);
  scene.add(hemiLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(3, 5, 2);
  scene.add(dirLight);

      // カメラを初期化
      const camera = new THREE.PerspectiveCamera(
        10,
        myCanvas.clientWidth / myCanvas.clientHeight,
        0.01,
        100
      );
      camera.position.set(0, 200, 2.2);
      camera.lookAt(scene.position);

      // レンダラーの初期化
      const renderer = new THREE.WebGLRenderer({ canvas: myCanvas });
      renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(myCanvas.clientWidth, myCanvas.clientHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

     

      

      // カメラコントローラー設定
      const orbitControls = new OrbitControls(camera, renderer.domElement);
      orbitControls.maxPolarAngle = Math.PI * 0.5;
      orbitControls.minDistance = 0.1;
      orbitControls.maxDistance = 100;
      orbitControls.enableDamping = true;
      orbitControls.dampingFactor = 0.06;
  // キャラが勝手に回転し続けないように自動回転はOFF
  orbitControls.autoRotate = false;
  orbitControls.autoRotateSpeed = 1.0;

  // --- カメラを完全固定したい場合 ---
  // ドラッグ回転 / ホイールズーム / 右ドラッグ移動など、ユーザー操作をすべて無効化
  orbitControls.enableRotate = false;
  orbitControls.enableZoom = false;
  orbitControls.enablePan = false;

      // GLB読み込み
      const loader = new GLTFLoader();
      let modelRoot;

  // アニメ用クロック（流れ星など）
  const clock = new THREE.Clock();

  // 追従ターゲット（頭ボーンが見つかればそれ、なければモデル全体）
  let headNode = null;
  let headRestQuat = null;
  // 目（左右）も少し追従させる
  let leftEyeNode = null;
  let rightEyeNode = null;
  let leftEyeRestQuat = null;
  let rightEyeRestQuat = null;
  let eyeYaw = 0;
  let eyePitch = 0;
  // 髪（軽い揺れ）
  const hairNodes = [];
  const hairRestQuats = new Map();

  // 腕のポーズ補正（Aスタンスを少し自然に）
  const ARM_POSE_FIX = true;
  let leftUpperArm = null;
  let rightUpperArm = null;
  let leftUpperArmRest = null;
  let rightUpperArmRest = null;
  let leftShoulder = null;
  let rightShoulder = null;
  let leftShoulderRest = null;
  let rightShoulderRest = null;
  // 上腕を少し下げる量（度）
  const ARM_DROP_DEG = 30;
  // わずかに内側へ
  const ARM_INWARD_DEG = 1;
  // 肩（鎖骨）を少し下げる量（いかり肩対策）
  const SHOULDER_DROP_DEG = 10;
  // 頭の安定化（角度制限＋スムージング）
  let headYaw = 0;
  let headPitch = 0;
  // モデルによって「正面」軸が違うので、向きが逆ならここを切り替える
  // 右にカーソル→右を向く、にならない場合は true/false を反転
  const HEAD_YAW_INVERT = true;

  // --- 安定性最優先モード ---
  // レイキャスト（床交点）方式は、カメラ/FOV/モデルスケールの影響でガタつきが出やすいので
  // 画面上のカーソル位置（NDC）→頭のヨー/ピッチへ直接マップする方式に固定します。
  const MOST_STABLE_SCREEN_TRACKING = true;
  // Live2Dっぽい稼働域（好みで微調整）
  const SCREEN_MAX_YAW = THREE.MathUtils.degToRad(30);
  const SCREEN_MAX_PITCH = THREE.MathUtils.degToRad(22);
  // 追従のなめらかさ（大きいほど素早い、小さいほどヌルい）
  const SCREEN_FOLLOW = 0.12;
  // 目は頭より小さく・少し遅めに
  const EYE_MAX_YAW = THREE.MathUtils.degToRad(25);
  const EYE_MAX_PITCH = THREE.MathUtils.degToRad(5);
  const EYE_FOLLOW = 0.10;
  // 目の左右が逆に動く場合は true/false を反転
  const EYE_YAW_INVERT = false;

  // --- 髪の揺れ（控えめ：そよ風/呼吸くらい） ---
  const HAIR_SWAY = true;
  const HAIR_MAX_YAW = THREE.MathUtils.degToRad(2.2);
  const HAIR_MAX_PITCH = THREE.MathUtils.degToRad(1.2);
  const HAIR_SPEED = 0.9;   // 揺れの速度
  const HAIR_FOLLOW = 0.10; // 追従（小さいほどしっとり）
  // 近づく/戻る用
  const modelBasePos = new THREE.Vector3(0, 0, 0);
  let basePosCaptured = false;
  let approach01 = 0; // 0..1

      // ---- カーソル反応（レイキャスト） ----
  const raycaster = new THREE.Raycaster();
  const mouseNdc = new THREE.Vector2(0, 0);
  // 以下は旧方式互換（MOST_STABLE_SCREEN_TRACKING=true の間は使わない）
  const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const hitPoint = new THREE.Vector3();
  const targetLook = new THREE.Vector3();
  const smoothedLook = new THREE.Vector3();
  let lookYOffset = 0;
      let hasLookTarget = false;

      function updateMouseFromEvent(ev) {
        const rect = myCanvas.getBoundingClientRect();
        const x = (ev.clientX - rect.left) / rect.width;
        const y = (ev.clientY - rect.top) / rect.height;
        mouseNdc.set(x * 2 - 1, -(y * 2 - 1));
      }

      // UIボタン等の上でも追従できるように、document全体でポインタ位置を取る
      // （canvas外に出ても「最後の位置」を保持して見続ける）
      document.addEventListener('pointermove', (ev) => {
        updateMouseFromEvent(ev);
        hasLookTarget = true;

  // 画面演出（暗フィルター + 発光）
  // CSS変数でラジアルグラデの中心を更新する
  const mx = (ev.clientX / window.innerWidth) * 100;
  const my = (ev.clientY / window.innerHeight) * 100;
  document.documentElement.style.setProperty('--mx', `${mx.toFixed(3)}%`);
  document.documentElement.style.setProperty('--my', `${my.toFixed(3)}%`);
  document.documentElement.style.setProperty('--glow', '1.35');
      });

      // data-target付きのUIは「クリックできる」導線として扱う（#ジャンプはしない）
      document.addEventListener('click', (e) => {
        const el = e.target?.closest?.('[data-target]');
        if (!el) return;
        e.preventDefault();
        const target = el.getAttribute('data-target') || '';
        // TODO: 将来ここを、モーダル表示やページ切り替えに差し替える
        console.log('nav:', target);
      });
      // ウィンドウ外に出た時だけ止める（必要ならこの挙動も変更可）
      window.addEventListener('blur', () => {
        hasLookTarget = false;
      });
      loader.load(
        'suzune1.glb',
        (gltf) => {
          modelRoot = gltf.scene;
          scene.add(modelRoot);

          // 正面の向きが合わない時用（必要なければコメントアウト）
          // modelRoot.rotation.y = Math.PI;

          // 「頭」っぽいノードを自動で探す（モデルにより名前が違うため）
          const headNameHint = /(head|頭|atama|face|neck|首|j_bip_c_head|bip01 head)/i;
          let best = null;
          modelRoot.traverse((obj) => {
            if (!obj || !obj.name) return;
            if (headNameHint.test(obj.name)) {
              // Head/頭 を優先、次に Neck/首
              const score =
                (/head|頭|atama/i.test(obj.name) ? 100 : 0) +
                (/face/i.test(obj.name) ? 60 : 0) +
                (/neck|首/i.test(obj.name) ? 40 : 0);
              if (!best || score > best.score) best = { obj, score };
            }
          });

          if (best) {
            headNode = best.obj;
            headRestQuat = headNode.quaternion.clone();
          }

          // 目ボーン名が確定しているので決め打ちで取得（これが一番安定）
          leftEyeNode = modelRoot.getObjectByName('左目');
          rightEyeNode = modelRoot.getObjectByName('右目');
          leftEyeRestQuat = leftEyeNode ? leftEyeNode.quaternion.clone() : null;
          rightEyeRestQuat = rightEyeNode ? rightEyeNode.quaternion.clone() : null;

          // 腕（上腕）を探してAスタンスを軽く補正
          if (ARM_POSE_FIX) {
            const leftHints = [
              '左腕', '左上腕', 'UpperArm_L', 'upperarm_l', 'LeftArm', 'leftUpperArm', 'J_Bip_L_UpperArm',
            ];
            const rightHints = [
              '右腕', '右上腕', 'UpperArm_R', 'upperarm_r', 'RightArm', 'rightUpperArm', 'J_Bip_R_UpperArm',
            ];
            const leftShoulderHints = [
              '左肩', '左鎖骨', 'Shoulder_L', 'shoulder_l', 'Clavicle_L', 'clavicle_l', 'LeftShoulder', 'J_Bip_L_Shoulder', 'J_Bip_L_Clavicle',
            ];
            const rightShoulderHints = [
              '右肩', '右鎖骨', 'Shoulder_R', 'shoulder_r', 'Clavicle_R', 'clavicle_r', 'RightShoulder', 'J_Bip_R_Shoulder', 'J_Bip_R_Clavicle',
            ];

            const pickByHints = (hints) => {
              for (const h of hints) {
                const o = modelRoot.getObjectByName(h);
                if (o) return o;
              }
              // ヒントが外れるモデル向けに、ゆるく正規表現探索
              const re = new RegExp(hints.map(s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|'), 'i');
              let found = null;
              modelRoot.traverse((obj) => {
                if (found) return;
                if (!obj || !obj.name) return;
                if (re.test(obj.name)) found = obj;
              });
              return found;
            };

            leftUpperArm = pickByHints(leftHints);
            rightUpperArm = pickByHints(rightHints);
            leftShoulder = pickByHints(leftShoulderHints);
            rightShoulder = pickByHints(rightShoulderHints);
            leftUpperArmRest = leftUpperArm ? leftUpperArm.quaternion.clone() : null;
            rightUpperArmRest = rightUpperArm ? rightUpperArm.quaternion.clone() : null;
            leftShoulderRest = leftShoulder ? leftShoulder.quaternion.clone() : null;
            rightShoulderRest = rightShoulder ? rightShoulder.quaternion.clone() : null;

            if (!leftUpperArm || !rightUpperArm) {
              console.warn('UpperArm bones not found:', {
                left: leftUpperArm?.name,
                right: rightUpperArm?.name,
              });
            }

            if (!leftShoulder || !rightShoulder) {
              console.warn('Shoulder/Clavicle bones not found:', {
                left: leftShoulder?.name,
                right: rightShoulder?.name,
              });
            }
          }

          // 髪揺れ：ルートボーン名が確定しているので、その配下だけを揺らす
          // （他パーツに影響しないように、探索範囲を強制的に限定）
          if (HAIR_SWAY) {
            const hairRoots = [
              modelRoot.getObjectByName('HEIR.004.L'),
              modelRoot.getObjectByName('HEIR.004.R'),
            ].filter(Boolean);

            const addHairSubtree = (root) => {
              root.traverse((obj) => {
                if (!obj) return;
                const isBoneLike = obj.isBone || obj.type === 'Bone' || obj.type === 'Object3D';
                if (!isBoneLike) return;
                hairNodes.push(obj);
                hairRestQuats.set(obj, obj.quaternion.clone());
              });
            };

            hairRoots.forEach(addHairSubtree);

            // 念のため上限（想定外の巨大階層でも破綻しにくく）
            if (hairNodes.length > 48) hairNodes.length = 48;

            if (hairNodes.length === 0) {
              console.warn('Hair roots not found: HEIR.004.L / HEIR.004.R');
            }
          }

          // モデル全体のサイズを見て、良い感じにカメラを合わせる
          const box = new THREE.Box3().setFromObject(modelRoot);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());

          modelRoot.position.sub(center); // 原点に寄せる

          // 「寄ってくる」の基準位置を確定（centerを引いた後）
          modelBasePos.copy(modelRoot.position);
          basePosCaptured = true;

          const maxDim = Math.max(size.x, size.y, size.z);
          const fitDist = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));
          camera.position.set(0, Math.max(0.8, maxDim * 0.3), fitDist * 0.5);
          orbitControls.target.set(0, Math.max(1, maxDim * 1.7), 0);
          orbitControls.update();
        },
        undefined,
        (err) => {
          console.error('GLBの読み込みに失敗しました:', err);
        }
      );

      // リサイズ対応（canvasをCSSで100%にしてるので必須）
      function resizeRendererToDisplaySize() {
        const width = myCanvas.clientWidth;
        const height = myCanvas.clientHeight;
        const needResize = renderer.domElement.width !== Math.floor(width * window.devicePixelRatio)
          || renderer.domElement.height !== Math.floor(height * window.devicePixelRatio);
        if (needResize) {
          renderer.setSize(width, height, false);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
        }
        return needResize;
      }

      // --- パララックス（UIに奥行き感） ---
      // mouseNdc(-1..1) を使い、各UIレイヤーを少しずつ別速度で動かす
      const PARALLAX_ENABLED = true;
      // 値が大きいほど動く（px）
      const PARALLAX_STRENGTH = 5;
      // 追従のなめらかさ
      const PARALLAX_FOLLOW = 0.07;
      const parallaxLayers = [];
      const _parT = { x: 0, y: 0 };
      const _parS = { x: 0, y: 0 };

      function initParallax() {
        parallaxLayers.length = 0;
        const isCoarse = window.matchMedia?.('(pointer: coarse)')?.matches;
        if (!PARALLAX_ENABLED || isCoarse) return;

        const pick = (sel, z, kx = 1, ky = 1) => {
          const el = document.querySelector(sel);
          if (!el) return;
          parallaxLayers.push({ el, z, kx, ky });
        };

        // 背中側(遠い)ほど小さく、手前ほど大きく
        pick('.layer-frame',  0, 0.40, 0.40);
        pick('.layer-side',   0, 0.70, 0.60);
        pick('.layer-hud',    0, 0.85, 0.75);
        pick('.layer-logo',   0, 1.10, 0.90);
        pick('.layer-links',  0, 1.25, 1.10);
      }

      function updateParallax() {
        if (parallaxLayers.length === 0) return;

        // 右へ動かしたらUIは少し左へ流れる（視差っぽさ）
        _parT.x = (-mouseNdc.x) * PARALLAX_STRENGTH;
        _parT.y = ( mouseNdc.y) * PARALLAX_STRENGTH;
        _parS.x += (_parT.x - _parS.x) * PARALLAX_FOLLOW;
        _parS.y += (_parT.y - _parS.y) * PARALLAX_FOLLOW;

        for (const l of parallaxLayers) {
          const x = _parS.x * l.kx;
          const y = _parS.y * l.ky;
          l.el.style.transform = `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, 0)`;
        }
      }

      // UIが描画された後に初期化
      initParallax();
      window.addEventListener('resize', initParallax);

      // ➌ 描画ループを開始
      renderer.setAnimationLoop(() => {
  const dt = Math.min(0.05, clock.getDelta());
        resizeRendererToDisplaySize();

  // UIパララックス
  updateParallax();



        // 寄ってくる強さ（カーソルの画面中心からの距離で 0..1）
        // 近いほど 1、遠いほど 0
        const dist2 = mouseNdc.lengthSq(); // 0..2 くらい
        const near01 = THREE.MathUtils.clamp(1.0 - Math.sqrt(dist2) / 1.2, 0, 1);
        // ぬるっと追従
        approach01 = THREE.MathUtils.lerp(approach01, hasLookTarget ? near01 : 0, 0.06);

        // カーソル追従（安定性最優先）
  if (modelRoot && hasLookTarget && headNode && headRestQuat && MOST_STABLE_SCREEN_TRACKING) {
          const x = THREE.MathUtils.clamp(mouseNdc.x, -1, 1);
          const y = THREE.MathUtils.clamp(mouseNdc.y, -1, 1);

          // 右にカーソル→右を向く（必要ならHEAD_YAW_INVERTで反転）
          const desiredYaw = (HEAD_YAW_INVERT ? x : x) * SCREEN_MAX_YAW;
          // 上にカーソル→上を向く（モデルによって逆ならここを -y に）
          const desiredPitch = (-y) * SCREEN_MAX_PITCH;

          headYaw = THREE.MathUtils.lerp(headYaw, desiredYaw, SCREEN_FOLLOW);
          headPitch = THREE.MathUtils.lerp(headPitch, desiredPitch, SCREEN_FOLLOW);

          const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), headYaw);
          const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), headPitch);
          const desiredQuat = headRestQuat.clone().multiply(qYaw).multiply(qPitch);
          headNode.quaternion.slerp(desiredQuat, 0.35);

          // 目の追従（軽めに）。※両目ボーンが揃っている時だけ動かす（違和感防止）
          if (leftEyeNode && rightEyeNode && leftEyeRestQuat && rightEyeRestQuat) {
            const eyeX = EYE_YAW_INVERT ? -x : x;
            const desiredEyeYaw = THREE.MathUtils.clamp(eyeX * EYE_MAX_YAW, -EYE_MAX_YAW, EYE_MAX_YAW);
            const desiredEyePitch = THREE.MathUtils.clamp((-y) * EYE_MAX_PITCH, -EYE_MAX_PITCH, EYE_MAX_PITCH);
            eyeYaw = THREE.MathUtils.lerp(eyeYaw, desiredEyeYaw, EYE_FOLLOW);
            eyePitch = THREE.MathUtils.lerp(eyePitch, desiredEyePitch, EYE_FOLLOW);

            const qEyeYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), eyeYaw);
            const qEyePitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), eyePitch);
            const eyeQuat = qEyeYaw.clone().multiply(qEyePitch);

            const leftDesired = leftEyeRestQuat.clone().multiply(eyeQuat);
            const rightDesired = rightEyeRestQuat.clone().multiply(eyeQuat);
            leftEyeNode.quaternion.slerp(leftDesired, 0.35);
            rightEyeNode.quaternion.slerp(rightDesired, 0.35);
          }


        // 髪の揺れ（そよ風くらい）
        if (HAIR_SWAY && hairNodes.length) {
          const t = performance.now() * 0.001;
          const baseYaw = Math.sin(t * HAIR_SPEED) * HAIR_MAX_YAW;
          const basePitch = Math.sin(t * (HAIR_SPEED * 1.27) + 1.0) * HAIR_MAX_PITCH;

          for (let i = 0; i < hairNodes.length; i++) {
            const n = hairNodes[i];
            const rest = hairRestQuats.get(n);
            if (!rest) continue;

            // 先端ほど少し大きく、位相もズラす
            const k = (i + 1) / (hairNodes.length + 1);
            const yaw = baseYaw * (0.45 + 0.75 * k) + Math.sin(t * (HAIR_SPEED * 1.9) + i * 0.6) * (HAIR_MAX_YAW * 0.18);
            const pitch = basePitch * (0.45 + 0.75 * k) + Math.sin(t * (HAIR_SPEED * 1.6) + i * 0.8) * (HAIR_MAX_PITCH * 0.18);

            const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
            const desired = rest.clone().multiply(qYaw).multiply(qPitch);
            n.quaternion.slerp(desired, HAIR_FOLLOW);
          }
        }

        // 腕のポーズ補正（Aスタンスを少し自然にする）
        if (ARM_POSE_FIX) {
          const drop = THREE.MathUtils.degToRad(ARM_DROP_DEG);
          const inward = THREE.MathUtils.degToRad(ARM_INWARD_DEG);
          const sDrop = THREE.MathUtils.degToRad(SHOULDER_DROP_DEG);

          // 上腕のローカル軸はモデルによって違うので、控えめにX/Zだけ触る
          if (leftUpperArm && leftUpperArmRest) {
            const qDrop = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), drop);
            const qIn = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), inward);
            const desired = leftUpperArmRest.clone().multiply(qDrop).multiply(qIn);
            leftUpperArm.quaternion.slerp(desired, 0.08);
          }
          if (rightUpperArm && rightUpperArmRest) {
            const qDrop = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, -1), drop);
            // 右腕は内側方向が逆になりやすいので符号を反転
            const qIn = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -inward);
            const desired = rightUpperArmRest.clone().multiply(qDrop).multiply(qIn);
            rightUpperArm.quaternion.slerp(desired, 0.08);
          }

          // 肩(鎖骨)も少しだけ下げると、いかり肩が緩和されやすい
          // ※軸はモデル依存なので、まずは小さめ&片側に合わせた符号で控えめに。
          if (leftShoulder && leftShoulderRest) {
            const qS = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), sDrop);
            const desired = leftShoulderRest.clone().multiply(qS);
            leftShoulder.quaternion.slerp(desired, 0.06);
          }
          if (rightShoulder && rightShoulderRest) {
            const qS = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, -1), sDrop);
            const desired = rightShoulderRest.clone().multiply(qS);
            rightShoulder.quaternion.slerp(desired, 0.06);
          }
        }
          modelRoot.rotation.z = THREE.MathUtils.lerp(modelRoot.rotation.z, 0, 0.2);
        } else if (modelRoot && hasLookTarget) {
          // フォールバック（頭が見つからない場合だけ）
          modelRoot.rotation.z = THREE.MathUtils.lerp(modelRoot.rotation.z, 0, 0.08);
        } else if (modelRoot) {
          // マウスが外れたらゆっくり戻す
          modelRoot.rotation.z = THREE.MathUtils.lerp(modelRoot.rotation.z, 0, 0.05);
          if (headNode && headRestQuat) {
            headNode.quaternion.slerp(headRestQuat, 0.06);
            headYaw = THREE.MathUtils.lerp(headYaw, 0, 0.08);
            headPitch = THREE.MathUtils.lerp(headPitch, 0, 0.08);
          }
          if (leftEyeNode && rightEyeNode && leftEyeRestQuat && rightEyeRestQuat) {
            leftEyeNode.quaternion.slerp(leftEyeRestQuat, 0.08);
            rightEyeNode.quaternion.slerp(rightEyeRestQuat, 0.08);
            eyeYaw = THREE.MathUtils.lerp(eyeYaw, 0, 0.10);
            eyePitch = THREE.MathUtils.lerp(eyePitch, 0, 0.10);
          }
        }

        // 近づく/離れる：カメラ方向に少し寄せる（モデル位置を動かす）
        if (modelRoot && basePosCaptured) {
          // 寄り量（0..1）に応じて前に出す。強すぎると酔うので控えめに。
          const forward = new THREE.Vector3();
          camera.getWorldDirection(forward);
          forward.y = 0;
          forward.normalize();

          // ふわっと上下揺れ（近いほど強い）
          const t = performance.now() * 0.001;
          const bob = Math.sin(t * 2.4) * 0.015 * approach01;

          const desiredPos = modelBasePos.clone()
            .add(forward.multiplyScalar(0.18 * approach01));
          desiredPos.y += bob;

          modelRoot.position.lerp(desiredPos, 0.08);
        }

        // 蛍っぽいゆらぎ（発光の強さを脈動させる）
        {
          const t = performance.now() * 0.001;
          const flicker = 0.20 * Math.sin(t * 2.2) + 0.12 * Math.sin(t * 4.7 + 0.8);
          const base = hasLookTarget ? 1.45 : 0.95;
          const g = Math.max(0.0, base + flicker);
          document.documentElement.style.setProperty('--glow', g.toFixed(3));
        }

        // カメラコントローラーを更新
        orbitControls.update();

        // 描画する
        renderer.render(scene, camera);
      });
    </script>
  </head>
